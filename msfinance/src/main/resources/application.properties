spring.application.name=msfinance
server.port=${SERVER_PORT:8081}

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/msfinance_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:msfinance_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:msfinance_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:admin_pass}

# Cross-service
msidentity.base-url=${MSIDENTITY_BASE_URL:http://localhost:8080}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
