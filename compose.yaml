services:

  postgres-msidentity:
    image: postgres:16-alpine
    container_name: postgres-msidentity
    environment:
      POSTGRES_DB: ${POSTGRES_MSIDENTITY_DB}
      POSTGRES_USER: ${POSTGRES_MSIDENTITY_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MSIDENTITY_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - postgres_msidentity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MSIDENTITY_USER} -d ${POSTGRES_MSIDENTITY_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-msfinance:
    image: postgres:16-alpine
    container_name: postgres-msfinance
    environment:
      POSTGRES_DB: ${POSTGRES_MSFINANCE_DB}
      POSTGRES_USER: ${POSTGRES_MSFINANCE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MSFINANCE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_msfinance_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MSFINANCE_USER} -d ${POSTGRES_MSFINANCE_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  msidentity:
    build:
      context: .
      dockerfile: msidentity/Dockerfile
    container_name: msidentity
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-msidentity:5432/${POSTGRES_MSIDENTITY_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_MSIDENTITY_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_MSIDENTITY_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres-msidentity:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  msfinance:
    build:
      context: .
      dockerfile: msfinance/Dockerfile
    container_name: msfinance
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-msfinance:5432/${POSTGRES_MSFINANCE_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_MSFINANCE_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_MSFINANCE_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres-msfinance:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_msidentity_data:
  postgres_msfinance_data:
  rabbitmq_data:
